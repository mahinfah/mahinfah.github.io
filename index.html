  <!-- Toggle button -->
  <button id="song" onclick="toggleAudio()">🔊 Mute</button>

  <script>
    const audio = document.getElementById('bgAudio');

    function toggleAudio() {
      if (audio.muted) {
        audio.muted = false;
        this.textContent = '🔊 Mute';
      } else {
        audio.muted = true;
        this.textContent = '🔇 Unmute';
      }
    }
  </script>
